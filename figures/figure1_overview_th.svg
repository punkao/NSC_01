  <text x="670" y="500" text-anchor="middle" font-size="12" fill="#4B5EAA">รับงานคี่ · โมเดลครบชุด</text>
  <text x="670" y="538" text-anchor="middle" font-size="12" fill="#9CA3AF">รายละเอียดดูรูปที่ 2</text>

