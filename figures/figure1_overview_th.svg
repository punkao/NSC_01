  <text x="670" y="380" text-anchor="middle" font-size="13" fill="#6B7280">โมเดลดูภาพ แล้วเขียนบรรยาย</text>
  <rect x="594" y="396" width="152" height="52" rx="7" fill="#EFF4FE" stroke="#BFD3FA" stroke-width="1.2"/>
  <text x="670" y="418" text-anchor="middle" font-size="14" font-weight="700" fill="#2563EB">การ์ดใบที่ 1</text>
