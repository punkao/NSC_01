  <text x="933" y="477" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1D21">คำบรรยาย</text>
  <text x="933" y="498" text-anchor="middle" font-size="12" fill="#6B7280">ทุก 1 วินาที</text>

  <line x1="1026" y1="400" x2="1094" y2="400" stroke="#9CA3AF" stroke-width="1.8" marker-end="url(#p1a)"/>
  <text x="1062" y="384" text-anchor="middle" font-size="12" fill="#9CA3AF" font-family="Consolas, monospace">JSON</text>

