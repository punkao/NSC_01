  <rect x="0" y="0" width="1600" height="790" fill="#FAFAF8"/>

  <text x="52" y="46" font-size="21" font-weight="700" fill="#1A1D21">รูปที่ 1.</text>
  <text x="146" y="46" font-size="21" fill="#1A1D21">ภาพรวมระบบ — ข้อมูลไหลจากกล้องไปถึงหน้าจอได้อย่างไร</text>
  <text x="52" y="74" font-size="14" fill="#6B7280">กล้อง CAM-A05 · โมเดล Cosmos-Reason2-8B · ไม่ต้องเทรนเพิ่ม · แบ่งงานลงการ์ดจอ 2 ใบ</text>
