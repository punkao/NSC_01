  <text x="1324" y="384" text-anchor="middle" font-size="12" fill="#9CA3AF" font-family="Consolas, monospace">+ กฎ</text>

  <rect x="1364" y="152" width="186" height="415" rx="11" fill="#FFFFFF" stroke="#C9C9C2" stroke-width="1.8"/>
  <use href="#p1mon" x="1438" y="192"/>
  <text x="1457" y="292" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9CA3AF" letter-spacing="1">L5</text>
