  <text x="1195" y="396" text-anchor="middle" font-size="15" fill="#374151">เทียบกฎความปลอดภัย</text>
  <text x="1195" y="420" text-anchor="middle" font-size="15" fill="#374151">→ ตัดสินความรุนแรง</text>
  <text x="1195" y="460" text-anchor="middle" font-size="15" fill="#374151">ตรวจขั้นตอนการทำงาน</text>
  <text x="1195" y="484" text-anchor="middle" font-size="15" fill="#374151">→ ทำครบตามคู่มือไหม</text>

