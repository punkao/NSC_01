  <text x="1457" y="372" text-anchor="middle" font-size="15" fill="#374151">หน้าจอเจ้าหน้าที่</text>
  <text x="1457" y="396" text-anchor="middle" font-size="15" fill="#374151">ควบคุมความปลอดภัย</text>
  <rect x="1381" y="428" width="152" height="44" rx="7" fill="#FAFAF8" stroke="#E0E0DB"/>
  <text x="1457" y="456" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1D21">แบบสด</text>
  <rect x="1381" y="484" width="152" height="44" rx="7" fill="#FAFAF8" stroke="#E0E0DB"/>
  <text x="1457" y="512" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1D21">แบบเล่นย้อนหลัง</text>

  <line x1="52" y1="632" x2="1548" y2="632" stroke="#DDDDD8" stroke-width="1"/>
  <rect x="52" y="652" width="30" height="15" rx="4" fill="#FFFFFF" stroke="#2563EB" stroke-width="2.2"/>
  <text x="96" y="665" font-size="14" fill="#374151">ชั้นเดียวที่ต้องใช้การ์ดจอ — ชั้นอื่นใช้แค่ซีพียูหรือเรียกผ่าน API</text>
  <text x="52" y="702" font-size="14" fill="#6B7280">การ์ดจอ 2 ใบ ต่างมีโมเดลครบทั้งตัว แล้วสลับกันรับงานคู่/คี่ (ไม่ได้ผ่าโมเดลแบ่งกัน) จึงไม่ต้องส่งข้อมูลข้ามการ์ด → เร็วขึ้นประมาณ 1.82 เท่า</text>
  <text x="52" y="732" font-size="14" fill="#6B7280">ความเร็วรวมประมาณ 1.17 วินาทีต่องาน → บรรยายได้ทุก 1 วินาที ขณะวิดีโอเล่นที่ 0.86 เท่าของความเร็วปกติ</text>
</svg>
